<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Skin Disease AI Classifier</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        body {

            font-family: 'Poppins', sans-serif;

            background-image: url("/static/bg/3d-animated-model-of-a-neutrophil-video.jpg");

            background-size:cover;

            backgtound-repeat:repeat-x;

            animation: moveBackground 20s linear infinite;

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            overflow: hidden;

        }

        @keyframes moveBackground {
            from{
            background-position: 0 0;
            }

            to{
            background-position: -1000px 0;

            }
        }

        .main-card {

            width: 100%;

            max-width: 600px;

            background: white;

            border-radius: 25px;

            padding: 40px;

            box-shadow:
                0 15px 40px rgba(0,0,0,0.2);

        }

        .title {

            font-size: 2.3rem;

            font-weight: 700;

            text-align: center;

            margin-bottom: 10px;

            color: #1e3c72;

        }

        .subtitle {

            text-align: center;

            color: gray;

            margin-bottom: 35px;

        }

        .upload-box {

            border: 2px dashed #2a5298;

            border-radius: 20px;

            padding: 30px;

            text-align: center;

            transition: 0.3s;

            background: #f8fbff;

        }

        .upload-box:hover {

            background: #eef5ff;

        }

        .preview-img {

            width: 100%;

            max-height: 300px;

            object-fit: cover;

            border-radius: 15px;

            margin-top: 20px;

            display: none;

        }

        .predict-btn {

            position : relative;

            overflow : visible;

            width: 100%;

            margin-top: 25px;

            padding: 12px;

            font-size: 1.1rem;

            font-weight: 600;

            border-radius: 15px;

            transition: 0.3s;

        }

        .predict-btn:hover{
            transform: translateY(-2px);

            box-shadow: 0 0 12px rgba(79,172,254,0.7);

        }

        .predict-btn::before,
        .predict-btn::after {
        content: "";
        position: absolute;

        width: 8px;
        height: 8px;

        border-radius: 50%;

        background: rgba(79,172,254,1);

        opacity: 0;
        pointer-events: none;
        filter: blur(1px);
        }

        .predict-btn::before{
            top:0;
            left:20%;
        }

        .predict-btn::after{
            top:100%;
            left:80%;
        }

        .predict-btn:hover::before,
        .predict-btn:hover::after {
        animation: particle 1s ease-out infinite;
        }

        @keyframes particle {
            0% {
            opacity: 1;
            transform: scale(1);
            box-shadow:
            0 0 0 0rgba(79,172,254,1),

            40px 20px 0 3px rgba(79,172,254,1),
            -40px -20px 0 3px rgba(79,172,254,1),

            80px -10px 0 2px rgba(79,172,254,1),
            -80px 10px 0 2px rgba(79,172,254,1);
            }
            100% {
            opacity: 0;
            transform: scale(0.5);
            box-shadow:
            0 -120px 0 4px rgba(79,172,254,0),
            0 120px 0 4px rgba(79,172,254,0),

            -160px -80px 0 3px rgba(79,172,254,0),
            160px 80px 0 3px rgba(79,172,254,0),

            -200px 0 0 2px rgba(79,172,254,0),
            200px 0 0 2px rgba(79,172,254,0);
            }
        }

        .result-box {

            margin-top: 30px;

            background: #f1f7ff;

            border-radius: 18px;

            padding: 20px;

            text-align: center;

        }

        .result-title {

            font-size: 1.2rem;

            color: gray;

        }

        .result-text {

            font-size: 2rem;

            font-weight: 700;

            color: #1e3c72;

            margin-top: 10px;

        }

    </style>

</head>

<body>

    <div class="main-card">

        <div class="title">
            Skin Disease AI
        </div>

        <div class="subtitle">
            Deep Learning Skin Lesion Classification
        </div>

        <form method="POST"
              enctype="multipart/form-data">

            <div class="upload-box">

                <input
                    type="file"
                    name="file"
                    class="form-control"
                    accept="image/*"
                    onchange="previewImage(event)"
                >

                <img id="preview"
                     class="preview-img">

            </div>

            <button
                type="submit"
                class="btn btn-primary predict-btn">

                Predict Disease

            </button>

        </form>

        {% if prediction %}

        <div class="result-box">

            <div class="result-title">
                Prediction Result
            </div>

            <div class="result-text">
                {{ prediction }}
            </div>

            <div style="margin-top:10px; color:gray;">

                Diagnostic Confidence:
                {{ confidence }}%

            </div>

        </div>

        {% endif %}

    </div>

    <script>

        function previewImage(event) {

            const preview =
                document.getElementById("preview");

            preview.src =
                URL.createObjectURL(
                    event.target.files[0]
                );

            preview.style.display = "block";
        }

    </script>

</body>

</html>
